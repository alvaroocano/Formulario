<!DOCTYPE html>
<html>
<head>
<title>FORMULARIO </title>
</head>
<body>
<h1>FORMULARIO</h1>
<form method="POST" action="http://formadorestic.com/alumnosdaw/procesaformulario.php">
<label for="nombre">Nombre:</label>
<input type="text" name="nombre" id="nombre" placeholder="Escriba su nombre"><br>
<label for="email">Email:</label>
<input type="email" name="email" id="email" placeholder="Escriba el email"><br>
<label for="quantity">Edad</label>
<input type="number" id="edad" name="edad"><br>
<br>¿Es mayor o menor de edad?<br>
<input type="radio" id="mayor" name="mayormenor" value="Mayor de edad">
<label for="mayor">Mayor de edad</label><br>
<input type="radio" id="menor" name="mayormenor" value="Menor de edad">
<label for="menor">Menor de edad</label><br>
<br><input type="submit" value="ENVIAR">
</form>

</body>
